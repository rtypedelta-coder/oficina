<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Rocha Miranda</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f;
            --border: #2a2a2a; --accent: #ff6b00; --accent2: #ffaa00;
            --green: #00c97a; --red: #ff3b3b; --yellow: #ffc107;
            --text: #e8e8e8; --muted: #666;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --display: 'Bebas Neue', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

        /* BANNER OFFLINE */
        .banner-offline { display: none; background: #333; color: var(--yellow); font-family: var(--mono); font-size: 0.75em; text-align: center; padding: 6px; letter-spacing: 1px; }
        .banner-offline.visivel { display: block; }
        .banner-sync { display: none; background: rgba(0,201,122,0.15); color: var(--green); font-family: var(--mono); font-size: 0.75em; text-align: center; padding: 6px; letter-spacing: 1px; }
        .banner-sync.visivel { display: block; }

        header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 18px 20px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-family: var(--display); font-size: 1.7em; letter-spacing: 2px; color: var(--text); line-height: 1; }
        .logo-sub { font-family: var(--mono); font-size: 0.65em; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
        .container { max-width: 640px; margin: 0 auto; padding: 20px 16px 60px; }
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .form-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
        .form-title { font-family: var(--display); font-size: 1.4em; letter-spacing: 2px; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .form-title span { color: var(--accent); }
        .field-group { margin-bottom: 12px; }
        label.field-label { font-family: var(--mono); font-size: 0.7em; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 0.95em; padding: 11px 14px; transition: border-color 0.2s; outline: none; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent); background: #1a1a1a; }
        textarea { height: 90px; resize: vertical; }
        input::placeholder, textarea::placeholder { color: var(--muted); }
        input[type="file"] { display: none; }

        .camera-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--surface2); border: 1px dashed var(--border); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.2s; font-size: 1em; color: var(--muted); width: 100%; font-family: var(--sans); }
        .camera-btn:hover { border-color: var(--accent); color: var(--text); }
        .foto-preview-wrap { display: none; margin-top: 10px; }
        .foto-preview-wrap img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); display: block; }
        .foto-acoes { display: flex; gap: 8px; margin-top: 8px; }
        .foto-acoes button { flex: 1; padding: 9px; border-radius: 8px; border: none; font-family: var(--display); font-size: 0.95em; letter-spacing: 1px; cursor: pointer; }
        .btn-rabisco { background: var(--accent); color: #000; }
        .btn-trocar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border) !important; }

        /* EDITOR */
        .editor-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 999; flex-direction: column; }
        .editor-overlay.ativo { display: flex; }
        .editor-toolbar { background: #111; padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #333; }
        .editor-toolbar label { font-family: var(--mono); font-size: 0.7em; color: var(--accent); letter-spacing: 1px; }
        .cor-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .cor-btn.ativo { border-color: white; }
        .esp-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 4px 10px; cursor: pointer; font-size: 0.85em; }
        .esp-btn.ativo { border-color: var(--accent); color: var(--accent); }
        .editor-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas#editorCanvas { touch-action: none; max-width: 100%; max-height: 100%; }
        .editor-bottom { background: #111; padding: 10px 14px; display: flex; gap: 10px; border-top: 1px solid #333; }
        .editor-bottom button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-family: var(--display); font-size: 1.1em; letter-spacing: 1px; cursor: pointer; }
        .btn-desfazer { background: var(--surface2); color: var(--text); }
        .btn-confirmar { background: var(--accent); color: #000; }
        .btn-cancelar-editor { background: var(--surface2); color: var(--muted); }

        .btn { width: 100%; padding: 13px; border-radius: 8px; border: none; font-family: var(--display); font-size: 1.15em; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-edit { background: var(--yellow); color: #000; flex: 1; }
        .btn-delete { background: var(--red); color: white; flex: 1; }

        .status-msg { font-family: var(--mono); font-size: 0.85em; text-align: center; margin-top: 10px; padding: 8px; border-radius: 6px; }
        .status-ok { color: var(--green); background: rgba(0,201,122,0.08); }
        .status-err { color: var(--red); background: rgba(255,59,59,0.08); }
        .status-loading { color: var(--accent2); background: rgba(255,170,0,0.08); }
        .status-offline { color: var(--yellow); background: rgba(255,193,7,0.08); }

        .list-header { font-family: var(--display); font-size: 1.3em; letter-spacing: 3px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .list-header .count { background: var(--accent); color: #000; font-size: 0.65em; padding: 2px 8px; border-radius: 20px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; position: relative; animation: fadeUp 0.3s ease both; }
        .card.pendente { border-color: var(--yellow); }
        .card-badge { position: absolute; top: 14px; right: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-family: var(--mono); font-size: 0.65em; color: var(--muted); padding: 3px 8px; }
        .badge-pendente { background: rgba(255,193,7,0.15); border-color: var(--yellow); color: var(--yellow); }
        .card-cliente { font-family: var(--display); font-size: 1.25em; letter-spacing: 1px; color: var(--text); margin-bottom: 6px; padding-right: 100px; }
        .card-row { display: flex; gap: 6px; margin-bottom: 4px; font-size: 0.88em; align-items: baseline; }
        .card-key { font-family: var(--mono); color: var(--accent); font-size: 0.8em; letter-spacing: 1px; min-width: 75px; }
        .card-val { color: #bbb; }
        .card-obs { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 8px 12px; font-size: 0.85em; color: var(--muted); font-style: italic; margin: 10px 0; line-height: 1.5; }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .card-actions .btn { padding: 9px; font-size: 0.95em; margin-top: 0; }

        /* GALERIA MINIATURAS */
        .galeria { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin: 10px 0; border-radius: 10px; overflow: hidden; }
        .galeria-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; display: block; }
        .galeria-item:active img { transform: scale(0.95); }

        /* LIGHTBOX */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .lightbox.ativo { display: flex; }
        .lightbox img { max-width: 100vw; max-height: 88vh; object-fit: contain; border-radius: 6px; }
        .lightbox-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.4em; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; height: 90px; margin-bottom: 14px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-family: var(--mono); font-size: 0.9em; }
        .empty-state .icon { font-size: 2.5em; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="banner-offline" id="bannerOffline">⚡ MODO OFFLINE — dados salvos localmente</div>
<div class="banner-sync" id="bannerSync">✓ Conexão restaurada — sincronizando...</div>

<header>
    <div class="logo-icon">🔧</div>
    <div>
        <div class="logo-text">Rocha Miranda</div>
        <div class="logo-sub">Sistema de Ordens de Serviço</div>
    </div>
</header>

<!-- EDITOR RABISCO -->
<div class="editor-overlay" id="editorOverlay">
    <div class="editor-toolbar">
        <label>COR:</label>
        <div class="cor-btn ativo" style="background:#ff3b3b" data-cor="#ff3b3b" onclick="selecionarCor(this)"></div>
        <div class="cor-btn" style="background:#ffaa00" data-cor="#ffaa00" onclick="selecionarCor(this)"></div>
        <div class="cor-btn" style="background:#00c97a" data-cor="#00c97a" onclick="selecionarCor(this)"></div>
        <div class="cor-btn" style="background:#4db8ff" data-cor="#4db8ff" onclick="selecionarCor(this)"></div>
        <div class="cor-btn" style="background:#ffffff" data-cor="#ffffff" onclick="selecionarCor(this)"></div>
        <div class="cor-btn" style="background:#000;border-color:#555" data-cor="#000000" onclick="selecionarCor(this)"></div>
        <label style="margin-left:6px">ESP:</label>
        <button class="esp-btn" data-esp="3" onclick="selecionarEsp(this)">P</button>
        <button class="esp-btn ativo" data-esp="6" onclick="selecionarEsp(this)">M</button>
        <button class="esp-btn" data-esp="12" onclick="selecionarEsp(this)">G</button>
    </div>
    <div class="editor-canvas-wrap"><canvas id="editorCanvas"></canvas></div>
    <div class="editor-bottom">
        <button class="btn-cancelar-editor" onclick="cancelarEditor()">CANCELAR</button>
        <button class="btn-desfazer" onclick="desfazer()">↩ DESFAZER</button>
        <button class="btn-confirmar" onclick="confirmarEditor()">✓ OK</button>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="fecharLightbox()">
    <button class="lightbox-close">✕</button>
    <img id="lightboxImg" onclick="event.stopPropagation()">
</div>

<div class="container">
    <div class="form-card">
        <div class="form-title" id="formTitle"><span>▮</span> Nova Ordem de Serviço</div>
        <input type="hidden" id="editId">

        <div class="field-group">
            <label class="field-label">Cliente</label>
            <input type="text" id="cliente" placeholder="">
        </div>
        <div class="field-group">
            <label class="field-label">Brinquedo</label>
            <input type="text" id="aparelho" placeholder="">
        </div>
        <div class="field-group">
            <label class="field-label">Defeito Relatado</label>
            <input type="text" id="defeito" placeholder="">
        </div>
        <div class="field-group">
            <label class="field-label">Observações Técnicas</label>
            <textarea id="obs" placeholder=""></textarea>
        </div>
        <div class="field-group">
            <label class="field-label">Foto</label>
            <input type="file" id="fotoInput" accept="image/*" capture="environment" onchange="fotoSelecionada(this)">
            <button class="camera-btn" onclick="document.getElementById('fotoInput').click()">
                <span style="font-size:1.4em">📷</span>
                <span id="cameraBtnText">Tirar Foto</span>
            </button>
            <div class="foto-preview-wrap" id="fotoPreviewWrap">
                <img id="fotoPreview">
                <div class="foto-acoes">
                    <button class="btn-rabisco" onclick="abrirEditor()">✏ Rabiscar</button>
                    <button class="btn-trocar" onclick="document.getElementById('fotoInput').click()">🔄 Trocar</button>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" id="btnAcao" onclick="enviar()">SALVAR ORDEM</button>
        <div id="status"></div>
    </div>

    <div class="list-header">ORDENS <span class="count" id="countBadge">...</span></div>
    <div id="lista"></div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbztdxWNTEONQdDJpV7c7Zmp3setjZAxzYRntZIXcUaIjiMq0SDx5_MvQfZm-CF-Qe7l/exec";
const DB_KEY = 'rocha_ordens';
const FILA_KEY = 'rocha_fila_sync';

let imagemBase64 = "";
let imagemMime = "image/jpeg";
let imagemNome = "foto.jpg";

// ===== OFFLINE DETECTION =====
function isOnline() { return navigator.onLine; }

function atualizarBannerConexao() {
    document.getElementById('bannerOffline').classList.toggle('visivel', !isOnline());
}

window.addEventListener('online', () => {
    document.getElementById('bannerOffline').classList.remove('visivel');
    document.getElementById('bannerSync').classList.add('visivel');
    sincronizarFila();
    setTimeout(() => document.getElementById('bannerSync').classList.remove('visivel'), 3000);
});
window.addEventListener('offline', atualizarBannerConexao);

// ===== STORAGE LOCAL =====
function carregarLocal() {
    try { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); } catch { return []; }
}

function salvarLocal(dados) {
    localStorage.setItem(DB_KEY, JSON.stringify(dados));
}

function carregarFila() {
    try { return JSON.parse(localStorage.getItem(FILA_KEY) || '[]'); } catch { return []; }
}

function salvarFila(fila) {
    localStorage.setItem(FILA_KEY, JSON.stringify(fila));
}

function adicionarFila(item) {
    const fila = carregarFila();
    fila.push(item);
    salvarFila(fila);
}

// ===== SINCRONIZAR FILA =====
async function sincronizarFila() {
    if (!isOnline()) return;
    const fila = carregarFila();
    if (fila.length === 0) return;

    const novaFila = [];
    for (const item of fila) {
        try {
            let fotoUrl = item.fotoLocal || '';

            // Upload da foto se ainda for base64
            if (fotoUrl && fotoUrl.startsWith('data:')) {
                const res = await fetch(URL_API, {
                    method: 'POST',
                    body: JSON.stringify({ acao: 'uploadFoto', base64: fotoUrl, mime: item.fotoMime || 'image/jpeg', nome: item.fotoNome || 'foto.jpg' })
                });
                const d = await res.json();
                if (d.ok) fotoUrl = d.url;
            }

            const params = new URLSearchParams({ acao: item.acao, id: item.id || '', cliente: item.cliente, aparelho: item.aparelho, defeito: item.defeito, obs: item.obs || '', foto: fotoUrl });
            const res2 = await fetch(URL_API + '?' + params.toString());
            const d2 = await res2.json();

            if (d2.ok) {
                // Atualiza local com URL do Drive
                const dados = carregarLocal();
                const idx = dados.findIndex(x => x.id === item.id);
                if (idx !== -1) { dados[idx].foto = fotoUrl; dados[idx].pendente = false; salvarLocal(dados); }
            } else {
                novaFila.push(item);
            }
        } catch {
            novaFila.push(item);
        }
    }
    salvarFila(novaFila);
    listar();
}

// ===== FOTO =====
function fotoSelecionada(input) {
    const file = input.files[0];
    if (!file) return;
    imagemNome = file.name;
    imagemMime = file.type;
    const reader = new FileReader();
    reader.onload = function() {
        imagemBase64 = reader.result;
        document.getElementById('fotoPreview').src = imagemBase64;
        document.getElementById('fotoPreviewWrap').style.display = 'block';
        document.getElementById('cameraBtnText').textContent = 'Tirar outra foto';
    }
    reader.readAsDataURL(file);
}

// ===== EDITOR RABISCO =====
const canvas = document.getElementById('editorCanvas');
const ctx = canvas.getContext('2d');
let desenhando = false;
let corAtual = '#ff3b3b';
let espAtual = 6;
let historico = [];
const img = new Image();

function abrirEditor() {
    if (!imagemBase64) return;
    document.getElementById('editorOverlay').classList.add('ativo');
    img.onload = function() {
        const maxW = window.innerWidth;
        const maxH = window.innerHeight - 130;
        const ratio = Math.min(maxW / img.width, maxH / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        historico = [ctx.getImageData(0, 0, canvas.width, canvas.height)];
    };
    img.src = imagemBase64;
}

function cancelarEditor() { document.getElementById('editorOverlay').classList.remove('ativo'); }
function confirmarEditor() {
    imagemBase64 = canvas.toDataURL(imagemMime);
    document.getElementById('fotoPreview').src = imagemBase64;
    document.getElementById('editorOverlay').classList.remove('ativo');
}
function desfazer() {
    if (historico.length <= 1) return;
    historico.pop();
    ctx.putImageData(historico[historico.length - 1], 0, 0);
}
function selecionarCor(el) {
    document.querySelectorAll('.cor-btn').forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo'); corAtual = el.dataset.cor;
}
function selecionarEsp(el) {
    document.querySelectorAll('.esp-btn').forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo'); espAtual = parseInt(el.dataset.esp);
}
function getPosCanvas(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (cx - rect.left) * sx, y: (cy - rect.top) * sy };
}
function iniciarDesenho(e) { desenhando = true; ctx.beginPath(); const p = getPosCanvas(e); ctx.moveTo(p.x, p.y); }
function continuarDesenho(e) {
    if (!desenhando) return;
    const p = getPosCanvas(e);
    ctx.lineTo(p.x, p.y); ctx.strokeStyle = corAtual; ctx.lineWidth = espAtual;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
}
function encerrarDesenho() { desenhando = false; historico.push(ctx.getImageData(0, 0, canvas.width, canvas.height)); }
canvas.addEventListener('mousedown', iniciarDesenho);
canvas.addEventListener('mousemove', continuarDesenho);
canvas.addEventListener('mouseup', encerrarDesenho);
canvas.addEventListener('touchstart', e => { e.preventDefault(); iniciarDesenho(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); continuarDesenho(e); }, { passive: false });
canvas.addEventListener('touchend', encerrarDesenho);

// ===== SALVAR =====
async function enviar() {
    const btn = document.getElementById('btnAcao');
    const status = document.getElementById('status');
    const cliente = document.getElementById('cliente').value.trim();
    const aparelho = document.getElementById('aparelho').value.trim();
    const defeito = document.getElementById('defeito').value.trim();
    const obs = document.getElementById('obs').value.trim();
    const editId = document.getElementById('editId').value;

    if (!cliente || !aparelho) { alert("Preencha ao menos Cliente e Brinquedo!"); return; }

    btn.disabled = true;

    const id = editId || Date.now().toString();
    const data = new Date().toLocaleDateString('pt-BR');
    const novaOrdem = { id, data, cliente, aparelho, defeito, obs, foto: imagemBase64, fotoMime: imagemMime, fotoNome: imagemNome, pendente: true };

    // Salva local imediatamente
    const dados = carregarLocal();
    if (editId) {
        const idx = dados.findIndex(x => x.id === editId);
        if (idx !== -1) dados[idx] = { ...dados[idx], ...novaOrdem };
    } else {
        dados.push(novaOrdem);
    }
    salvarLocal(dados);

    if (!isOnline()) {
        adicionarFila({ acao: editId ? 'editar' : 'salvar', ...novaOrdem, fotoLocal: imagemBase64 });
        status.innerHTML = '<div class="status-msg status-offline">📦 Salvo offline — será sincronizado quando tiver internet</div>';
        btn.disabled = false;
        setTimeout(() => { listar(); limparForm(); }, 1000);
        return;
    }

    // Online: tenta sincronizar agora
    try {
        let fotoUrl = '';
        if (imagemBase64) {
            status.innerHTML = '<div class="status-msg status-loading">📷 Enviando foto...</div>';
            const res = await fetch(URL_API, { method: 'POST', body: JSON.stringify({ acao: 'uploadFoto', base64: imagemBase64, mime: imagemMime, nome: imagemNome }) });
            const d = await res.json();
            if (d.ok) fotoUrl = d.url;
        }

        status.innerHTML = '<div class="status-msg status-loading">⏳ Salvando...</div>';
        const params = new URLSearchParams({ acao: editId ? 'editar' : 'salvar', id, cliente, aparelho, defeito, obs, foto: fotoUrl });
        const res2 = await fetch(URL_API + '?' + params.toString());
        const d2 = await res2.json();

        if (d2.ok) {
            // Atualiza local com URL real do Drive
            const dados2 = carregarLocal();
            const idx = dados2.findIndex(x => x.id === id);
            if (idx !== -1) { dados2[idx].foto = fotoUrl; dados2[idx].pendente = false; salvarLocal(dados2); }
            status.innerHTML = '<div class="status-msg status-ok">✓ Salvo com sucesso!</div>';
            setTimeout(() => { listar(); limparForm(); btn.disabled = false; }, 1000);
        } else throw new Error(d2.error);
    } catch (e) {
        adicionarFila({ acao: editId ? 'editar' : 'salvar', ...novaOrdem, fotoLocal: imagemBase64 });
        status.innerHTML = '<div class="status-msg status-offline">📦 Salvo offline — será sincronizado depois</div>';
        btn.disabled = false;
        setTimeout(() => { listar(); limparForm(); }, 1000);
    }
}

function limparForm() {
    document.getElementById('editId').value = '';
    document.getElementById('cliente').value = '';
    document.getElementById('aparelho').value = '';
    document.getElementById('defeito').value = '';
    document.getElementById('obs').value = '';
    imagemBase64 = '';
    document.getElementById('fotoPreviewWrap').style.display = 'none';
    document.getElementById('fotoPreview').src = '';
    document.getElementById('cameraBtnText').textContent = 'Tirar Foto';
    document.getElementById('fotoInput').value = '';
    const btn = document.getElementById('btnAcao');
    btn.textContent = 'SALVAR ORDEM';
    btn.style.background = '';
    btn.style.color = '';
    document.getElementById('formTitle').innerHTML = '<span>▮</span> Nova Ordem de Serviço';
    document.getElementById('status').innerHTML = '';
}

// ===== LISTAR =====
async function listar() {
    const listaDiv = document.getElementById('lista');

    // Mostra dados locais imediatamente
    let dados = carregarLocal();

    // Tenta buscar do servidor se online
    if (isOnline()) {
        try {
            const res = await fetch(URL_API + "?t=" + Date.now());
            const servidor = await res.json();
            if (Array.isArray(servidor)) {
                // Mescla: mantém pendentes locais, adiciona os do servidor
                const pendentes = dados.filter(d => d.pendente);
                const idsServidor = servidor.map(x => x.id);
                const novosDados = [...servidor, ...pendentes.filter(p => !idsServidor.includes(p.id))];
                salvarLocal(novosDados);
                dados = novosDados;
            }
        } catch {}
    }

    listaDiv.innerHTML = "";
    document.getElementById('countBadge').textContent = dados.length;

    if (dados.length === 0) {
        listaDiv.innerHTML = `<div class="empty-state"><span class="icon">📋</span>Nenhuma ordem ainda.</div>`;
        return;
    }

    [...dados].reverse().forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card' + (item.pendente ? ' pendente' : '');
        div.style.animationDelay = (i * 0.04) + 's';

        const badgeHtml = item.pendente
            ? `<div class="card-badge badge-pendente">⏳ PENDENTE</div>`
            : (item.data ? `<div class="card-badge">${item.data}</div>` : '');

        const fotoSrc = item.foto || '';
        const fotoHtml = fotoSrc ? `
            <div class="galeria">
                <div class="galeria-item" onclick="abrirLightbox('${fotoSrc}')">
                    <img src="${fotoSrc}" loading="lazy">
                </div>
            </div>` : '';

        div.innerHTML = `
            ${badgeHtml}
            <div class="card-cliente">${item.cliente || '—'}</div>
            <div class="card-row"><span class="card-key">BRINQUEDO</span><span class="card-val">${item.aparelho || '—'}</span></div>
            <div class="card-row"><span class="card-key">DEFEITO</span><span class="card-val">${item.defeito || '—'}</span></div>
            ${item.obs ? `<div class="card-obs">${item.obs}</div>` : ''}
            ${fotoHtml}
            <div class="card-actions">
                <button class="btn btn-edit" onclick='prepararEdicao(${JSON.stringify(item).replace(/'/g, "&#39;")})'>✏ ALTERAR</button>
                <button class="btn btn-delete" onclick="deletar('${item.id}')">✕ REMOVER</button>
            </div>
        `;
        listaDiv.appendChild(div);
    });
}

// ===== LIGHTBOX =====
function abrirLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('ativo');
}
function fecharLightbox() { document.getElementById('lightbox').classList.remove('ativo'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharLightbox(); });

// ===== EDITAR =====
function prepararEdicao(item) {
    document.getElementById('editId').value = item.id;
    document.getElementById('cliente').value = item.cliente || '';
    document.getElementById('aparelho').value = item.aparelho || '';
    document.getElementById('defeito').value = item.defeito || '';
    document.getElementById('obs').value = item.obs || '';
    imagemBase64 = '';

    if (item.foto) {
        document.getElementById('fotoPreview').src = item.foto;
        document.getElementById('fotoPreviewWrap').style.display = 'block';
    }

    const btn = document.getElementById('btnAcao');
    btn.textContent = 'CONFIRMAR ALTERAÇÃO';
    btn.style.background = '#ffc107';
    btn.style.color = '#000';
    document.getElementById('formTitle').innerHTML = '<span>✏</span> Editando Ordem';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== DELETAR =====
async function deletar(id) {
    if (!confirm("Deseja apagar esta ordem?")) return;

    // Remove local
    const dados = carregarLocal().filter(x => x.id !== id);
    salvarLocal(dados);
    listar();

    if (isOnline()) {
        try {
            const res = await fetch(URL_API + '?' + new URLSearchParams({ acao: 'deletar', id }));
            await res.json();
        } catch {}
    } else {
        adicionarFila({ acao: 'deletar', id });
    }
}

// ===== INIT =====
atualizarBannerConexao();
listar();
sincronizarFila();
</script>
